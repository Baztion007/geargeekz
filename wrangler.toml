#:schema node_modules/wrangler/config-schema.json
name = "geargeekz"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── REQUIRED for @opennextjs/cloudflare ──────────────────────────────────
# These tell wrangler where to find the build output.
# DO NOT remove — without these, wrangler can't find the compiled worker.
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[vars]
NEXT_PUBLIC_SITE_URL = "https://geargeekz.com"

# ─── Cloudflare Deployment Guide ───────────────────────────────────────────
#
# DEPLOY USING: npm run cf:deploy
#   (This runs `opennextjs-cloudflare build && opennextjs-cloudflare deploy`)
#
# DO NOT run `wrangler deploy` directly — it will fail because the build
# output (.open-next/) must be generated first by opennextjs-cloudflare build.
#
# ─── GitHub Actions Auto-Deploy ────────────────────────────────────────────
# The workflow at .github/workflows/deploy-cloudflare.yml handles this.
# You need to add these secrets to your GitHub repo:
#   Settings → Secrets and variables → Actions → New repository secret
#   - CLOUDFLARE_API_TOKEN  (Create at: https://dash.cloudflare.com/profile/api-tokens)
#     Required permissions: Workers Scripts - Edit, Workers KV - Edit
#   - CLOUDFLARE_ACCOUNT_ID (Found in Cloudflare dashboard URL or Workers overview)
#
# ─── IMPORTANT: Do NOT use Cloudflare Pages dashboard ──────────────────────
# Cloudflare Pages dashboard cannot deploy Workers-based Next.js apps.
# The deploy command in Pages will fail because it can't find the build output.
# Use the GitHub Actions workflow or CLI deploy instead.
#
# ─── Prerequisites ─────────────────────────────────────────────────────────
#
# 1. Create a Turso database (required — Cloudflare Workers can't use file: SQLite):
#    $ turso db create geargeekz
#    $ turso db show geargeekz --url     → DATABASE_URL
#    $ turso db tokens create geargeekz  → DATABASE_AUTH_TOKEN
#
# 2. Push the Prisma schema to Turso:
#    $ DATABASE_URL=libsql://... DATABASE_AUTH_TOKEN=... bun run db:push
#
# 3. Seed the database (after first deploy):
#    $ curl -X POST https://geargeekz.com/api/seed
#
# ─── Set these as Secrets in Cloudflare dashboard ──────────────────────────
# Workers → geargeekz → Settings → Variables and Secrets
# (or Pages → geargeekz → Settings → Environment variables)
#   - ADMIN_PASSWORD (secure admin password)
#   - ADMIN_SESSION_SECRET (random secret, at least 32 chars)
#   - DATABASE_URL (libsql://your-db.turso.io)
#   - DATABASE_AUTH_TOKEN (Turso auth token)
#
# Optional affiliate tag overrides:
# NEXT_PUBLIC_AFFILIATE_TAG_AMAZON
# NEXT_PUBLIC_AFFILIATE_TAG_WALMART
# NEXT_PUBLIC_AFFILIATE_TAG_BESTBUY
# NEXT_PUBLIC_AFFILIATE_TAG_TARGET
# NEXT_PUBLIC_AFFILIATE_TAG_REI
# NEXT_PUBLIC_AFFILIATE_TAG_BHPHOTO
