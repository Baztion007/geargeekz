name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Build static site
        run: bash scripts/build-static.sh /geargeekz
        env:
          NEXT_PUBLIC_BASE_PATH: /geargeekz

      - name: Verify 404.html exists for SPA routing
        run: |
          if [ -f out/404.html ]; then
            echo "✅ 404.html exists"
          else
            echo "⚠️ 404.html missing, creating from index.html"
            cp out/index.html out/404.html
          fi

      - name: Verify .nojekyll exists
        run: |
          if [ ! -f out/.nojekyll ]; then
            touch out/.nojekyll
          fi
          echo "✅ .nojekyll exists"

      - name: Verify build output
        run: |
          echo "📋 Build verification:"
          echo "  index.html: $([ -f out/index.html ] && echo '✅' || echo '❌')"
          echo "  404.html:   $([ -f out/404.html ] && echo '✅' || echo '❌')"
          echo "  .nojekyll:  $([ -f out/.nojekyll ] && echo '✅' || echo '❌')"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
